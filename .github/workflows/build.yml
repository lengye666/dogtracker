name: Build DogTracker

on:
  workflow_dispatch:

jobs:
  build:
    name: Build DogTracker IPA
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: |
        xcodebuild -project DogTracker.xcodeproj \
          -scheme DogTracker \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES \
          PRODUCT_BUNDLE_IDENTIFIER=com.lengye.dogtracker

    - name: Check binary
      run: |
        APP="build/Build/Products/Release-iphoneos/DogTracker.app"
        echo "=== App bundle ==="
        ls -la "$APP/"
        echo ""
        echo "=== Binary ==="
        file "$APP/DogTracker"
        echo ""
        echo "=== Signing ==="
        codesign -dvv "$APP/DogTracker" 2>&1 || echo "No signature info"

    - name: Package IPA
      run: |
        APP="build/Build/Products/Release-iphoneos/DogTracker.app"
        mkdir -p Payload
        cp -r "$APP" Payload/
        zip -r DogTracker.ipa Payload/
        rm -rf Payload
        ls -lh DogTracker.ipa

    - uses: actions/upload-artifact@v4
      with:
        name: DogTracker-IPA
        path: DogTracker.ipa
